    <!-- DNS Prefetch & Preconnect for early connections -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.googletagmanager.com">
    <link rel="dns-prefetch" href="https://www.clarity.ms">
    <link rel="canonical" href="https://vmwebsolutions.in/">

    <!-- LCP Hero Image Preload: starts download before React boots (~800ms faster) -->
    <link rel="preload" as="image" type="image/webp" href="/images/desktop-mockup.webp" fetchpriority="high">
    <!-- Preconnect to external image CDN to save DNS+TLS (~200ms) -->
    <link rel="preconnect" href="https://images.unsplash.com">

    <!-- Non-blocking Critical CSS Fonts -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap">

    <!-- Deferred Analytics Injection -->
    <script>
      window.addEventListener('load', () => {
        // Delay analytics parsing until critical thread is idle
        requestIdleCallback(() => {
          // Google Analytics
          const ga = document.createElement('script');
          ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX';
          ga.async = true;
          document.body.appendChild(ga);
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-XXXXXXX');

          // Clarity
          (function(c,l,a,r,i,t,y){
              c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
              t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
              y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
          })(window, document, "clarity", "script", "YOUR_PROJECT_ID");
        });
      });
    </script>
