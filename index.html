<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>VM Web Solutions</title>
    <meta name="description" content="Affordable website development for small businesses, coaching institutes, and gyms in India. Get a high-converting website that generates WhatsApp leads." />
    
    <!-- DNS Prefetch & Preconnect for early connections -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.googletagmanager.com">
    <link rel="dns-prefetch" href="https://www.clarity.ms">
    <link rel="canonical" href="https://vmwebsolutions.in/">

    <!-- Non-blocking Critical CSS Fonts -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap">
    </noscript>

    <!-- Schema Markup Execution (Non-blocking by default) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "VM Web Solutions",
      "image": "https://vmwebsolutions.in/logo.png",
      "description": "High-converting website development and local SEO services for Indian small businesses.",
      "url": "https://vmwebsolutions.in/",
      "telephone": "+918309358319",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Hyderabad",
        "addressRegion": "Telangana",
        "addressCountry": "IN"
      },
      "priceRange": "₹4,999 - ₹19,999"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Deferred Analytics Injection -->
    <script>
      window.addEventListener('load', () => {
        // Delay analytics parsing until critical thread is idle
        requestIdleCallback(() => {
          // Google Analytics
          const ga = document.createElement('script');
          ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX';
          ga.async = true;
          document.body.appendChild(ga);
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-XXXXXXX');

          // Clarity
          (function(c,l,a,r,i,t,y){
              c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
              t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
              y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
          })(window, document, "clarity", "script", "YOUR_PROJECT_ID");
        });
      });
    </script>
  </body>
</html>
